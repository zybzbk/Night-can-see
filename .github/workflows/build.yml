name: 构建

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 选JDK21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 同步
        uses: gradle/actions/setup-gradle@v4
  
      - name: 给权限
        run: chmod +x ./gradlew

      - name: 构建     
        run: ./gradlew build
             
      - name: 发布文件
        uses: actions/upload-artifact@v7
        with:
          name: nightcansee
          path: /home/runner/work/Night-can-see/Night-can-seessss/build/libs/nightcansee-1.0.0.jar