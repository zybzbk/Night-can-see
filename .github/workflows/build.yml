name: 构建

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 选JDK21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 同步
        uses: gradle/actions/setup-gradle@v4
  
      - name: 给权限
        run: chmod +x ./gradlew

      - name: 构建     
        run: ./gradlew build
  deloy: 
    runs-on: ubuntu-latest
    needs: build
    steps:
        - run: find /usr/bin/bash -name "*.jar"

        - name: 发布文件
          uses: actions/upload-artifact@v7
          with:
            path: /build/libs/